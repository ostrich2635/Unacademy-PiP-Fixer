<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Unacademy PiP Fixer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="icon48.png" alt="Logo" class="logo">
      <h2>PiP Fixer</h2>
    </div>
    
    <div class="action-group">
      <button id="toggle-pip" class="btn primary">Toggle PiP Mode</button>
    </div>
    
    <div class="divider"></div>
    
    <div class="color-section">
      <label>Background Color</label>
      <div class="color-control">
        <input type="color" id="bg-color-picker" value="#202022">
        <span id="hex-code" class="hex-display">#202022</span>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
